<!--
  MODES loader.
  Paste this into the "Scripts" (HTML/JS injection) field of any page that uses
  the mode/form cards. It pulls modes.js from GitHub (raw.githack) on the live
  site, or a local dev server when off-domain. modes.js injects its own CSS, so
  there's nothing to add to the page's Styles field.

  Bump ?v=1 -> ?v=2 ... after each push to dodge raw.githack's cache.
-->
<script>
  (function () {
    var host = window.location.hostname;
    var isLocal = host !== 'dragonballrage.wiki' &&
                  host !== 'www.dragonballrage.wiki';

    var base = isLocal
      ? 'http://localhost:8080/'
      : 'https://raw.githack.com/narcinothing/special-fishstick/main/';

    var script = document.createElement('script');
    script.src = base + 'modes.js?v=1';
    script.defer = true;
    document.head.appendChild(script);
  })();
</script>
